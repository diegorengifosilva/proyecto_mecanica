<!DOCTYPE html>
<html lang="es" class="h-full bg-gray-950">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simulador de Newton - UTP Física Clásica</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0891b2">
  <link rel="apple-touch-icon" href="/static/icon.svg">
  <link rel="icon" type="image/svg+xml" href="/static/icon.svg">
  <link rel="manifest" href="/manifest.json">
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Google Fonts (Outfit and JetBrains Mono) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  
  <style>
    body {
      font-family: 'Outfit', sans-serif;
    }
    .font-mono {
      font-family: 'JetBrains Mono', monospace;
    }
    /* Estilos forzados de responsividad y PWA para celulares */
    @media (max-width: 1023px) {
      #main-simulator-container, #main-resolutor-container {
        display: flex !important;
        flex-direction: column !important;
        height: auto !important;
        width: 100% !important;
        max-width: 100% !important;
        overflow-y: auto !important;
      }
      #main-simulator-container > section:not(.fixed), 
      #main-resolutor-container > section:not(.fixed) {
        width: 100% !important;
        max-width: 100% !important;
        flex: none !important;
        height: auto !important;
        overflow: visible !important;
      }
      html, body, #root, main, header {
        width: 100% !important;
        max-width: 100vw !important;
        overflow-x: hidden !important;
      }
      h1, p {
        white-space: normal !important;
        word-break: break-word !important;
      }
    }
  </style>

  <!-- Configurar import map para React y ReactDOM sin bundler -->

</head>
<body class="h-full text-slate-100 selection:bg-cyan-500 selection:text-slate-900">
  <div id="root" class="h-full"></div>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.26.4/babel.min.js"></script>
<script>
  // Evitar almacenamiento en caché del navegador en desarrollo
  const script = document.createElement('script');
  script.type = 'text/babel';
  script.setAttribute('data-presets', 'react');
  script.src = '/static/App.js?t=' + Date.now();
  document.body.appendChild(script);
</script>
<script>
  if ('serviceWorker' in navigator) {
    // Desactivar temporalmente el Service Worker para evitar persistencia de cache en fase de refinamiento
    navigator.serviceWorker.getRegistrations().then((registrations) => {
      for (let registration of registrations) {
        registration.unregister();
        console.log('Service Worker desactivado para pruebas en vivo');
      }
    });
  }
</script>
</body>
</html>
